<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Farmer - Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="auth-body">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="auth-card">
    <div class="auth-badge"><i class="bi bi-shield-check"></i> Secure Access</div>
    <h1>Create account</h1>
    <p>Join Smart Farmer to track recommendations and profits.</p>
    <form id="register-form">
      <label class="field-label">Username</label>
      <input type="text" name="username" placeholder="Choose username" required />
      <label class="field-label">Password</label>
      <input type="password" name="password" placeholder="Password (min 6 chars)" required />
      <button type="submit"><i class="bi bi-person-plus"></i> Register</button>
    </form>
    <p class="auth-link">Already registered? <a href="/login-page">Login</a></p>
    <p id="register-message" class="form-message"></p>
  </div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
